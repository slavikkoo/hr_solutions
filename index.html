<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Задачі команди</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F2EE;--surface:#FFFFFF;--surface2:#EDEBE6;--surface3:#E4E1DA;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--border3:rgba(0,0,0,0.22);
  --text:#18181A;--text2:#5A5955;--text3:#9A9892;
  --accent:#3C3489;--accent-bg:#EEEDFE;--accent-light:#AFA9EC;
  --teal-bg:#E1F5EE;--teal-txt:#085041;
  --amber-bg:#FAEEDA;--amber-txt:#633806;
  --red-bg:#FCEBEB;--red-txt:#791F1F;
  --blue-bg:#E6F1FB;--blue-txt:#0C447C;
  --green-bg:#EAF3DE;--green-txt:#27500A;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:18px;
  --shadow:0 1px 3px rgba(0,0,0,0.06);--tr:150ms cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"]{
  --bg:#111110;--surface:#1C1C1A;--surface2:#242422;--surface3:#2E2E2B;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--border3:rgba(255,255,255,0.2);
  --text:#F0EDE6;--text2:#A09D96;--text3:#6A6862;
  --accent:#7F77DD;--accent-bg:#26215C;--accent-light:#534AB7;
  --teal-bg:#04342C;--teal-txt:#9FE1CB;
  --amber-bg:#412402;--amber-txt:#FAC775;
  --red-bg:#501313;--red-txt:#F7C1C1;
  --blue-bg:#042C53;--blue-txt:#B5D4F4;
  --green-bg:#173404;--green-txt:#C0DD97;
}
body{font-family:'Geologica',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;display:flex;transition:background var(--tr),color var(--tr)}
.sidebar{width:224px;min-height:100vh;background:var(--surface);border-right:0.5px solid var(--border2);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;transition:background var(--tr)}
.sidebar-logo{padding:18px 14px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border)}
.logo-txt{font-size:14px;font-weight:600;letter-spacing:-0.01em}
.logo-txt span{color:var(--accent)}
.theme-btn{width:30px;height:30px;border-radius:var(--r-md);border:0.5px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all var(--tr);font-size:14px}
.theme-btn:hover{background:var(--surface3)}
.sb-section{padding:12px 10px 0}
.sb-label{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;padding:0 6px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.sb-label-btn{width:18px;height:18px;border-radius:4px;border:none;background:none;cursor:pointer;color:var(--text3);display:flex;align-items:center;justify-content:center;transition:all var(--tr);font-size:11px;padding:0}
.sb-label-btn:hover{background:var(--surface2);color:var(--text2)}
.q-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 8px;border-radius:var(--r-md);border:none;background:none;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all var(--tr);text-align:left;font-family:'Geologica',sans-serif}
.q-btn:hover{background:var(--surface2);color:var(--text)}
.q-btn.active{background:var(--accent-bg);color:var(--accent)}
.q-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background var(--tr)}
.q-btn.active .q-dot{background:var(--accent)}
.q-months{padding:2px 0 4px 22px}
.m-btn{display:flex;align-items:center;width:100%;padding:5px 8px;border-radius:var(--r-sm);border:none;background:none;font-size:12px;color:var(--text3);cursor:pointer;transition:all var(--tr);gap:6px;text-align:left;font-family:'Geologica',sans-serif}
.m-btn:hover{background:var(--surface2);color:var(--text2)}
.m-pill{margin-left:auto;background:var(--surface2);border-radius:20px;font-size:10px;padding:1px 7px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.mem-btn{display:flex;align-items:center;gap:8px;width:100%;padding:6px 8px;border-radius:var(--r-md);border:none;background:none;font-size:13px;color:var(--text2);cursor:pointer;transition:all var(--tr);text-align:left;font-family:'Geologica',sans-serif}
.mem-btn:hover{background:var(--surface2)}
.mem-btn.active{background:var(--surface2);color:var(--text);font-weight:500}
.av-sm{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0}
.mem-count{margin-left:auto;font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.sidebar-foot{margin-top:auto;padding:10px;border-top:0.5px solid var(--border)}
.nq-btn{display:flex;align-items:center;gap:6px;width:100%;padding:7px 8px;border-radius:var(--r-md);border:0.5px solid var(--border2);background:none;font-size:12px;color:var(--text2);cursor:pointer;transition:all var(--tr);font-family:'Geologica',sans-serif}
.nq-btn:hover{background:var(--surface2)}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:0.5px solid var(--border2);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:10;transition:background var(--tr)}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-title{font-size:15px;font-weight:600;letter-spacing:-0.01em}
.q-badge{background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--r-sm);padding:3px 10px;font-size:12px;color:var(--text2);font-weight:500;cursor:pointer;transition:all var(--tr)}
.q-badge:hover{border-color:var(--border3);color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn-add{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r-md);background:var(--accent);color:#fff;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:all var(--tr);font-family:'Geologica',sans-serif}
.btn-add:hover{opacity:0.88;transform:translateY(-1px)}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px 24px;background:var(--surface);border-bottom:0.5px solid var(--border);transition:background var(--tr)}
.stat{background:var(--bg);border-radius:var(--r-lg);padding:12px 14px}
.stat-lbl{font-size:10px;font-weight:500;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.06em}
.stat-val{font-size:22px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:-0.03em}
.sv-default{color:var(--text)}.sv-blue{color:var(--blue-txt)}.sv-green{color:var(--green-txt)}.sv-red{color:var(--red-txt)}
.content{padding:20px 24px;flex:1}
.month-sec{margin-bottom:2rem}
.month-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.month-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;white-space:nowrap}
.month-badge{background:var(--surface);border:0.5px solid var(--border2);border-radius:20px;padding:1px 8px;font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.month-line{flex:1;height:0.5px;background:var(--border2)}
.task-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--r-lg);margin-bottom:6px;transition:border-color var(--tr),box-shadow var(--tr);overflow:hidden}
.task-card:hover{border-color:var(--border3);box-shadow:var(--shadow)}
.task-card.is-cont{border-left:2.5px solid var(--accent-light)}
.task-card.is-copy{border-left:2.5px solid #5DCAA5;opacity:.9}
.task-row{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none}
.dir-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;letter-spacing:.04em;text-transform:uppercase}
.d-hrms{background:var(--accent-bg);color:var(--accent)}
.d-analytics{background:var(--teal-bg);color:var(--teal-txt)}
.d-other{background:var(--surface2);color:var(--text2)}
.task-name-main{font-size:13px;font-weight:500;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-biz-inline{font-size:11px;color:var(--text3);white-space:nowrap}
.task-row-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0}
.sp{font-size:10px;padding:2px 7px;border-radius:5px;border:0.5px solid var(--border2);color:var(--text2);white-space:nowrap;font-weight:500}
.sp-in{background:var(--blue-bg);border-color:transparent;color:var(--blue-txt)}
.sp-done{background:var(--green-bg);border-color:transparent;color:var(--green-txt)}
.sp-cont{background:var(--accent-bg);border-color:transparent;color:var(--accent)}
.pp{font-size:10px;padding:2px 7px;border-radius:5px;white-space:nowrap;font-weight:500}
.pp-high{background:var(--red-bg);color:var(--red-txt)}
.pp-med{background:var(--amber-bg);color:var(--amber-txt)}
.dl-pill{font-size:10px;color:var(--text2);white-space:nowrap;font-family:'JetBrains Mono',monospace}
.dl-pill.ov{color:var(--red-txt);font-weight:500}
.expand-arrow{font-size:10px;color:var(--text3);transition:transform var(--tr);flex-shrink:0}
.task-card.expanded .expand-arrow{transform:rotate(180deg)}
.task-detail{display:none;border-top:0.5px solid var(--border);background:var(--bg);padding:14px;transition:background var(--tr)}
.task-card.expanded .task-detail{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.detail-field{display:flex;flex-direction:column;gap:3px}
.detail-label{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em}
.detail-val{font-size:12px;color:var(--text2)}
.detail-note{font-size:12px;color:var(--text2);font-style:italic;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--r-sm);padding:8px 10px;margin-bottom:10px}
.detail-actions{display:flex;gap:6px;justify-content:flex-end}
.icon-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--r-sm);border:0.5px solid var(--border2);background:var(--surface);font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;transition:all var(--tr);font-family:'Geologica',sans-serif}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.icon-btn.danger:hover{background:var(--red-bg);border-color:transparent;color:var(--red-txt)}
.icon-btn.primary{background:var(--accent);color:#fff;border-color:transparent}
.icon-btn.primary:hover{opacity:0.85}
.cont-tag,.copy-tag{display:inline-flex;align-items:center;gap:4px;font-size:9px;border-radius:4px;padding:2px 6px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.cont-tag{background:var(--accent-bg);color:var(--accent)}
.copy-tag{background:var(--teal-bg);color:var(--teal-txt)}
.add-row{display:flex;align-items:center;gap:6px;width:100%;padding:7px 4px;color:var(--text3);font-size:12px;font-weight:500;background:none;border:none;cursor:pointer;transition:color var(--tr);font-family:'Geologica',sans-serif}
.add-row:hover{color:var(--text2)}
.empty-m{background:var(--surface);border:0.5px dashed var(--border2);border-radius:var(--r-lg);padding:18px;text-align:center;color:var(--text3);font-size:12px}
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;align-items:flex-start;justify-content:center;padding-top:60px;backdrop-filter:blur(2px)}
.backdrop.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r-xl);border:0.5px solid var(--border2);padding:20px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);transition:background var(--tr)}
.modal-sm{max-width:360px}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px;letter-spacing:-0.01em}
.form-row{margin-bottom:10px}
.form-label{font-size:9px;color:var(--text3);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.07em;display:block}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input,select,textarea{font-family:'Geologica',sans-serif;font-size:13px;color:var(--text);background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r-md);padding:8px 10px;width:100%;outline:none;transition:border-color var(--tr),box-shadow var(--tr)}
textarea{resize:vertical;min-height:60px}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(83,74,183,.12)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:14px;border-top:0.5px solid var(--border)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r-md);font-size:13px;font-weight:500;border:0.5px solid var(--border2);color:var(--text);background:var(--surface);cursor:pointer;transition:all var(--tr);font-family:'Geologica',sans-serif}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--accent);color:#fff;border-color:transparent}
.btn-primary:hover{opacity:0.88}
.move-info{background:var(--accent-bg);border-radius:var(--r-md);padding:10px 12px;font-size:11px;color:var(--accent);margin-top:6px;line-height:1.6}
.task-preview{background:var(--bg);border-radius:var(--r-md);padding:10px 12px;margin-bottom:12px;font-size:13px;color:var(--text2)}
.members-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto}
.member-edit-row{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:var(--r-md);padding:8px 10px}
.color-dot{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600}
.me-name{flex:1;font-size:13px;color:var(--text)}
.mini-btn{width:26px;height:26px;border-radius:var(--r-sm);border:0.5px solid var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);transition:all var(--tr);font-size:12px}
.mini-btn:hover{background:var(--surface2);color:var(--text)}
.mini-btn.danger:hover{background:var(--red-bg);color:var(--red-txt);border-color:transparent}
.add-member-row{display:flex;gap:8px;margin-top:8px}
.color-picker-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform var(--tr)}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.selected{border-color:var(--text);transform:scale(1.1)}
.divider{height:0.5px;background:var(--border);margin:12px 0}
/* LOADING */
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:14px;transition:opacity 0.3s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.spinner{width:32px;height:32px;border:2.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text3)}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:var(--bg);padding:8px 16px;border-radius:var(--r-md);font-size:12px;font-weight:500;opacity:0;transition:all 0.25s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* CONFIG BANNER */
.config-banner{background:var(--amber-bg);border:0.5px solid var(--amber-txt);border-radius:var(--r-md);padding:10px 14px;margin:16px 24px;font-size:12px;color:var(--amber-txt);line-height:1.6}
.config-banner code{background:rgba(0,0,0,0.08);padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:11px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Завантаження задач...</div>
</div>

<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <div class="topbar" id="topbar"></div>
  <div id="configBanner"></div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="content" id="content"></div>
</div>

<!-- TASK MODAL -->
<div class="backdrop" id="taskModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Нова задача</div>
    <div class="form-row"><label class="form-label">Назва</label><input id="f-name" placeholder="Назва задачі..."></div>
    <div class="form-grid">
      <div class="form-row"><label class="form-label">Напрямок</label><select id="f-dir"><option value="HRMS">HRMS</option><option value="Analytics">Analytics</option><option value="Other">Other</option></select></div>
      <div class="form-row"><label class="form-label">Бізнес / Продукт</label><input id="f-biz" placeholder="DUOMO, Genesis..."></div>
    </div>
    <div class="form-grid">
      <div class="form-row"><label class="form-label">Місяць</label><select id="f-month"></select></div>
      <div class="form-row"><label class="form-label">Відповідальний</label><select id="f-member"></select></div>
    </div>
    <div class="form-grid">
      <div class="form-row"><label class="form-label">Статус</label><select id="f-status"><option value="not_started">Не розпочато</option><option value="in_progress">В процесі</option><option value="done">Завершено</option></select></div>
      <div class="form-row"><label class="form-label">Пріоритет</label><select id="f-prio"><option value="">—</option><option value="medium">Середній</option><option value="high">Високий</option></select></div>
    </div>
    <div class="form-grid">
      <div class="form-row"><label class="form-label">Початок</label><input id="f-start" type="date"></div>
      <div class="form-row"><label class="form-label">Дедлайн</label><input id="f-deadline" type="date"></div>
    </div>
    <div class="form-row"><label class="form-label">Нотатка</label><textarea id="f-note" placeholder="Додаткова інформація..."></textarea></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeTaskModal()">Скасувати</button>
      <button class="btn btn-primary" onclick="saveTask()">Зберегти</button>
    </div>
  </div>
</div>

<!-- MOVE MODAL -->
<div class="backdrop" id="moveModal">
  <div class="modal modal-sm">
    <div class="modal-title">Перенести задачу</div>
    <div class="task-preview" id="movePreview"></div>
    <div class="form-row"><label class="form-label">Перенести на місяць</label><select id="f-target"></select></div>
    <div class="move-info">Задача залишиться у поточному місяці зі статусом <strong>Continues →</strong> і продублюється у вибраному місяці.</div>
    <div class="modal-footer">
      <button class="btn" onclick="closeMoveModal()">Скасувати</button>
      <button class="btn btn-primary" onclick="confirmMove()">Перенести →</button>
    </div>
  </div>
</div>

<!-- NEW QUARTER MODAL -->
<div class="backdrop" id="newQModal">
  <div class="modal modal-sm">
    <div class="modal-title">Новий квартал</div>
    <div class="form-grid">
      <div class="form-row"><label class="form-label">Рік</label><input id="nq-year" type="number" value="2026" min="2024" max="2035"></div>
      <div class="form-row"><label class="form-label">Квартал</label><select id="nq-q"><option value="1">Q1 (Січ–Бер)</option><option value="2">Q2 (Кві–Чер)</option><option value="3" selected>Q3 (Лип–Вер)</option><option value="4">Q4 (Жов–Гру)</option></select></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeNQModal()">Скасувати</button>
      <button class="btn btn-primary" onclick="addQuarter()">Створити</button>
    </div>
  </div>
</div>

<!-- RENAME QUARTER MODAL -->
<div class="backdrop" id="renameQModal">
  <div class="modal modal-sm">
    <div class="modal-title">Перейменувати квартал</div>
    <div class="form-row"><label class="form-label">Назва</label><input id="rq-name" placeholder="Q3 · 2026"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeRenameQ()">Скасувати</button>
      <button class="btn btn-primary" onclick="confirmRenameQ()">Зберегти</button>
    </div>
  </div>

// ── SUPABASE HELPERS ──────────────────────────────────
function sbFetch(path, opts={}){
  if(!isConfigured) return Promise.resolve({ok:false, json:()=>({})});
  return fetch(SUPABASE_URL+'/rest/v1/'+path, {
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},
    ...opts
  });
}
async function sbGet(table, query=''){
  const r=await sbFetch(table+'?'+query+'&order=id');
  return r.ok ? r.json() : [];
}
async function sbInsert(table, row){
  return sbFetch(table,{method:'POST',body:JSON.stringify(row)});
}
async function sbUpdate(table, id, data, idCol='id'){
  return sbFetch(table+'?'+idCol+'=eq.'+id,{method:'PATCH',body:JSON.stringify(data)});
}
async function sbDelete(table, id, idCol='id'){
  return sbFetch(table+'?'+idCol+'=eq.'+id,{method:'DELETE'});
}

// ── INIT ──────────────────────────────────────────────
async function init(){
  theme=localStorage.getItem('tq_theme')||'light';

  if(!isConfigured){

    showConfigBanner();

    render();
    return;
  }

  try{
    const [q,m,t]=await Promise.all([
      sbGet('quarters'),
      sbGet('members','order=sort_order'),
      sbGet('tasks'),
    ]);
    quarters=q||[];
    members=m||[];
    tasks=(t||[]).map(mapTask);
    nextId=tasks.reduce((mx,t)=>Math.max(mx,t.id),0)+1;
    activeQId=localStorage.getItem('tq_activeQ')||quarters[0]?.id||'';
    if(!quarters.find(x=>x.id===activeQId)) activeQId=quarters[0]?.id||'';
  }catch(e){
    showToast('Помилка підключення до бази');
    loadDemo();
  }
  hideLoading();
  render();
}

    continued:t.continued,copyOf:t.copy_of

}
function unmapTask(t){
  return{
    id:t.id,q_id:t.qId,month:t.month,dir:t.dir,biz:t.biz,name:t.name,

// ── THEME ─────────────────────────────────────────────
function applyTheme(){document.documentElement.setAttribute('data-theme',theme);}
function toggleTheme(){
  theme=theme==='light'?'dark':'light';

const aq=()=>quarters.find(q=>q.id===activeQId)||quarters[0];
const qMonths=()=>QM[aq()?.q||3];
const qTasks=()=>tasks.filter(t=>t.qId===activeQId);
const vTasks=()=>activeFilter==='all'?qTasks():qTasks().filter(t=>t.member===activeFilter);
const getMember=id=>members.find(m=>m.id===id)||{label:'?',color:'#888',bg:'#eee'};
const fmtDate=d=>{if(!d)return null;const[,m,day]=d.split('-');return`${parseInt(day)} ${MN_SHORT[parseInt(m)]||''}`;};
const isOv=t=>{if(!t.deadline||t.status==='done')return false;const td=new Date();td.setHours(0,0,0,0);return new Date(t.deadline)<td;};

// ── RENDER ────────────────────────────────────────────
function render(){
  renderSidebar();renderTopbar();renderStats();renderContent();

    setTimeout(()=>{const el=document.getElementById('m-'+scrollToMonth);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});scrollToMonth=null;},60);

function renderSidebar(){
  const qt=qTasks();const months=qMonths();
  const qsHtml=quarters.map(q=>{
    const isA=q.id===activeQId;
    const mHtml=isA?months.map(m=>{
      const cnt=activeFilter==='all'?qt.filter(t=>t.month===m).length:qt.filter(t=>t.month===m&&t.member===activeFilter).length;

  }).join('');

    const cnt=m.id==='all'?qt.length:qt.filter(t=>t.member===m.id).length;
    return`<button class="mem-btn${activeFilter===m.id?' active':''}" onclick="setFilter('${m.id}')"><div class="av-sm" style="background:${m.bg};color:${m.color}">${m.label}</div>${m.name||m.label}<span class="mem-count">${cnt}</span></button>`;

    <div class="sb-section" style="margin-top:4px"><div class="sb-label">Учасники<button class="sb-label-btn" onclick="openSettings()">✎</button></div>${memHtml}</div>
    <div class="sidebar-foot"><button class="nq-btn" onclick="exportData()">↓ Експорт JSON</button></div>
  `;
}

  const a=aq();

function renderStats(){
  const vt=vTasks();
  const total=vt.filter(t=>!t.copyOf).length;
  const inprog=vt.filter(t=>t.status==='in_progress').length;
  const done=vt.filter(t=>t.status==='done').length;
  const overdue=vt.filter(t=>isOv(t)).length;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat"><div class="stat-lbl">Всього задач</div><div class="stat-val sv-default">${total}</div></div>
    <div class="stat"><div class="stat-lbl">В процесі</div><div class="stat-val sv-blue">${inprog}</div></div>
    <div class="stat"><div class="stat-lbl">Завершено</div><div class="stat-val sv-green">${done}</div></div>
    <div class="stat"><div class="stat-lbl">Прострочено</div><div class="stat-val sv-red">${overdue}</div></div>
  `;
}

function renderContent(){
  const months=qMonths();const vt=vTasks();const today=new Date();today.setHours(0,0,0,0);
  document.getElementById('content').innerHTML=months.map(month=>{
    const mt=vt.filter(t=>t.month===month);
    return`<div class="month-sec" id="m-${month}">
      <div class="month-hdr"><span class="month-title">${MN[month]}</span><span class="month-badge">${mt.length}</span><span class="month-line"></span></div>
      ${mt.length?mt.map(t=>taskHtml(t,today)).join(''):'<div class="empty-m">Немає задач у цьому місяці</div>'}
      <button class="add-row" onclick="openAddModal(${month})">＋ Додати задачу</button>
    </div>`;
  }).join('');
}

function taskHtml(t,today){
  const mem=getMember(t.member);const dl=fmtDate(t.deadline);const ov=isOv(t);
  const sMap={not_started:'Не розпочато',in_progress:'В процесі',done:'Завершено',continues:'Continues →'};
  const sCls={not_started:'sp',in_progress:'sp sp-in',done:'sp sp-done',continues:'sp sp-cont'};
  const dCls=t.dir==='HRMS'?'d-hrms':t.dir==='Analytics'?'d-analytics':'d-other';
  const prioH=t.prio==='high'?'<span class="pp pp-high">Вис.</span>':t.prio==='medium'?'<span class="pp pp-med">Сер.</span>':'';
  const ctag=t.continued&&!t.copyOf?'<span class="cont-tag">→ continues</span>':t.copyOf!==null?'<span class="copy-tag">↩ перенесено</span>':'';
  const isExp=expandedIds.includes(t.id);
  return`<div class="task-card${t.continued&&!t.copyOf?' is-cont':''}${t.copyOf!==null?' is-copy':''}${isExp?' expanded':''}" id="tc-${t.id}">
    <div class="task-row" onclick="toggleExpand(${t.id})">
      <span class="dir-badge ${dCls}">${t.dir}</span>
      <span class="task-name-main" title="${t.name}">${t.name}</span>
      <span class="task-biz-inline">${t.biz||''}</span>
      <div class="task-row-meta">
        <div class="av" style="background:${mem.bg};color:${mem.color}" title="${mem.name||mem.label}">${mem.label}</div>
        <span class="${sCls[t.status]||'sp'}">${sMap[t.status]||t.status}</span>
        ${prioH}${dl?`<span class="dl-pill${ov?' ov':''}">${dl}</span>`:''}${ctag}
      </div>
      <span class="expand-arrow">▾</span>
    </div>
    <div class="task-detail">
      <div class="detail-grid">
        <div class="detail-field"><span class="detail-label">Відповідальний</span><span class="detail-val">${mem.name||mem.label}</span></div>
        <div class="detail-field"><span class="detail-label">Бізнес</span><span class="detail-val">${t.biz||'—'}</span></div>
        <div class="detail-field"><span class="detail-label">Початок</span><span class="detail-val">${fmtDate(t.start)||'—'}</span></div>
        <div class="detail-field"><span class="detail-label">Дедлайн</span><span class="detail-val${ov?' sv-red':''}">${dl||'—'}</span></div>
      </div>
      ${t.note?`<div class="detail-note">${t.note}</div>`:''}
      <div class="detail-actions">
        ${!t.copyOf&&!t.continued?`<button class="icon-btn" onclick="event.stopPropagation();openMoveModal(${t.id})">→ Перенести</button>`:''}
        <button class="icon-btn danger" onclick="event.stopPropagation();deleteTask(${t.id})">✕ Видалити</button>
        <button class="icon-btn primary" onclick="event.stopPropagation();openEditModal(${t.id})">✎ Редагувати</button>
      </div>
    </div>
  </div>`;
}

function toggleExpand(id){
  const idx=expandedIds.indexOf(id);
  if(idx>=0) expandedIds.splice(idx,1); else expandedIds.push(id);
  saveLocal();
  const card=document.getElementById('tc-'+id);
  if(card) card.classList.toggle('expanded',expandedIds.includes(id));
}

// ── CRUD TASKS ────────────────────────────────────────
function setQ(id){activeQId=id;activeFilter='all';expandedIds=[];saveLocal();render();}
function setFilter(f){activeFilter=f;saveLocal();render();}
function jumpMonth(m){scrollToMonth=m;render();}

function populateTaskForm(month, task){
  const months=qMonths();const def=month||months[0];
  document.getElementById('f-month').innerHTML=months.map(m=>`<option value="${m}"${m===def?' selected':''}>${MN[m]}</option>`).join('');
  document.getElementById('f-member').innerHTML=members.filter(m=>m.id!=='all').map(m=>`<option value="${m.id}"${task&&task.member===m.id?' selected':''}>${m.name||m.label}</option>`).join('');
  document.getElementById('f-name').value=task?task.name:'';
  document.getElementById('f-biz').value=task?task.biz:'';
  document.getElementById('f-dir').value=task?task.dir:'HRMS';
  document.getElementById('f-status').value=task?task.status:'not_started';
  document.getElementById('f-prio').value=task?task.prio||'':'';
  document.getElementById('f-start').value=task?task.start||'':'';
  document.getElementById('f-deadline').value=task?task.deadline||'':'';
  document.getElementById('f-note').value=task?task.note||'':'';
  if(task) document.getElementById('f-month').value=task.month;
}

function openAddModal(month){
  editingId=null;
  document.getElementById('modalTitle').textContent='Нова задача';
  populateTaskForm(month, null);
  document.getElementById('taskModal').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),100);
}
function openEditModal(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  editingId=id;
  document.getElementById('modalTitle').textContent='Редагувати задачу';
  populateTaskForm(null, t);
  document.getElementById('taskModal').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),100);
}
function closeTaskModal(){document.getElementById('taskModal').classList.remove('open');editingId=null;}

async function saveTask(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){document.getElementById('f-name').focus();return;}
  const data={name,dir:document.getElementById('f-dir').value,biz:document.getElementById('f-biz').value.trim()||'—',month:parseInt(document.getElementById('f-month').value),member:document.getElementById('f-member').value,status:document.getElementById('f-status').value,prio:document.getElementById('f-prio').value||null,start:document.getElementById('f-start').value||null,deadline:document.getElementById('f-deadline').value||null,note:document.getElementById('f-note').value.trim()||null};
  closeTaskModal();
  if(editingId!==null){
    tasks=tasks.map(t=>t.id===editingId?{...t,...data}:t);
    render();showToast('Задачу оновлено');
    if(isConfigured) await sbUpdate('tasks',editingId,unmapTask({...tasks.find(t=>t.id===editingId)}));
  }else{
    const newTask={id:nextId++,qId:activeQId,continued:false,copyOf:null,...data};
    tasks.push(newTask);
    render();showToast('Задачу додано');
    if(isConfigured) await sbInsert('tasks',unmapTask(newTask));
  }
}

async function deleteTask(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  if(t.continued) tasks=tasks.map(c=>c.copyOf===id?{...c,copyOf:null}:c).map(o=>o.id===id?{...o,continued:false}:o);
  if(t.copyOf!==null){const sibs=tasks.filter(c=>c.copyOf===t.copyOf&&c.id!==id);if(!sibs.length)tasks=tasks.map(o=>o.id===t.copyOf?{...o,continued:false,status:o.status==='continues'?'not_started':o.status}:o);}
  tasks=tasks.filter(t=>t.id!==id);
  expandedIds=expandedIds.filter(i=>i!==id);
  render();showToast('Задачу видалено');
  if(isConfigured) await sbDelete('tasks',id);
}

// ── MOVE ──────────────────────────────────────────────
function openMoveModal(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  const months=qMonths();const next=months.filter(m=>m>t.month);
  if(!next.length){alert('Це останній місяць кварталу.');return;}
  movingId=id;
  document.getElementById('movePreview').innerHTML=`<strong style="color:var(--text)">${t.name}</strong><br><span style="font-size:12px;color:var(--text3)">${t.biz} · ${MN[t.month]}</span>`;
  document.getElementById('f-target').innerHTML=next.map(m=>`<option value="${m}">${MN[m]}</option>`).join('');
  document.getElementById('moveModal').classList.add('open');
}
function closeMoveModal(){document.getElementById('moveModal').classList.remove('open');movingId=null;}
async function confirmMove(){
  const target=parseInt(document.getElementById('f-target').value);
  const orig=tasks.find(t=>t.id===movingId);if(!orig)return;
  tasks=tasks.map(t=>t.id===movingId?{...t,continued:true,status:'continues'}:t);
  const newTask={...orig,id:nextId++,month:target,status:'not_started',continued:false,copyOf:movingId};
  tasks.push(newTask);
  closeMoveModal();render();showToast('Задачу перенесено');
  if(isConfigured){
    await sbUpdate('tasks',movingId,{continued:true,status:'continues'});
    await sbInsert('tasks',unmapTask(newTask));
  }
}

// ── QUARTERS ──────────────────────────────────────────
function openNQModal(){document.getElementById('newQModal').classList.add('open');}
function closeNQModal(){document.getElementById('newQModal').classList.remove('open');}
async function addQuarter(){
  const year=parseInt(document.getElementById('nq-year').value);
  const q=parseInt(document.getElementById('nq-q').value);
  const id=`q${q}-${year}`;
  if(quarters.find(x=>x.id===id)){showToast('Цей квартал вже існує');return;}
  const newQ={id,year,q,label:`Q${q} · ${year}`};
  quarters.push(newQ);activeQId=id;activeFilter='all';
  closeNQModal();render();showToast('Квартал створено');
  if(isConfigured) await sbInsert('quarters',newQ);
}

function openRenameQ(id){
  const q=quarters.find(x=>x.id===id);if(!q)return;
  renamingQId=id;
  document.getElementById('rq-name').value=q.label;
  document.getElementById('renameQModal').classList.add('open');
  setTimeout(()=>document.getElementById('rq-name').focus(),100);
}
function closeRenameQ(){document.getElementById('renameQModal').classList.remove('open');renamingQId=null;}
async function confirmRenameQ(){
  const name=document.getElementById('rq-name').value.trim();if(!name)return;
  quarters=quarters.map(q=>q.id===renamingQId?{...q,label:name}:q);
  closeRenameQ();render();showToast('Перейменовано');
  if(isConfigured) await sbUpdate('quarters',renamingQId,{label:name});
}

// ── MEMBERS ───────────────────────────────────────────
function openSettings(){renderMembersList();renderColorPicker();document.getElementById('settingsModal').classList.add('open');}
function closeSettings(){document.getElementById('settingsModal').classList.remove('open');render();}

function renderMembersList(){
  document.getElementById('membersList').innerHTML=members.filter(m=>m.id!=='all').map(m=>`
    <div class="member-edit-row">
      <div class="color-dot" style="background:${m.bg};color:${m.color}">${m.label}</div>
      <span class="me-name">${m.name||m.label}</span>
      <div class="me-actions"><button class="mini-btn danger" onclick="deleteMember('${m.id}')">✕</button></div>
    </div>`).join('');
}
function renderColorPicker(){
  document.getElementById('colorPicker').innerHTML=COLOR_PRESETS.map((c,i)=>`<div class="color-swatch${newMemberColor===COLOR_PRESETS[i]?' selected':''}" style="background:${c.bg};border-color:${newMemberColor===COLOR_PRESETS[i]?c.color:'transparent'}" onclick="selectColor(${i})"></div>`).join('');
}
function selectColor(i){newMemberColor=COLOR_PRESETS[i];renderColorPicker();}

async function addMember(){
  const nameInput=document.getElementById('new-mem-name');
  const name=nameInput.value.trim();if(!name)return;
  const initials=name.split(' ').slice(0,2).map(w=>w[0].toUpperCase()).join('').slice(0,2);
  const id='m'+Date.now();
  const m={id,label:initials,name,color:newMemberColor.color,bg:newMemberColor.bg,sort_order:members.length};
  members.push(m);nameInput.value='';
  renderMembersList();showToast(`${name} додано`);
  if(isConfigured) await sbInsert('members',m);
}

async function deleteMember(id){
  if(tasks.some(t=>t.member===id)){showToast('Спочатку переназначте задачі учасника');return;}
  members=members.filter(x=>x.id!==id);
  renderMembersList();showToast('Учасника видалено');
  if(isConfigured) await sbDelete('members',id);
}

// ── EXPORT ────────────────────────────────────────────
function exportData(){
  const blob=new Blob([JSON.stringify({quarters,tasks,members},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='team-tasks-backup.json';a.click();
  showToast('Дані експортовано');
}

// ── CLOSE MODALS ──────────────────────────────────────
['taskModal','moveModal','newQModal','renameQModal','settingsModal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){
    if(e.target===this){this.classList.remove('open');editingId=null;movingId=null;renamingQId=null;}
  });
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    ['taskModal','moveModal','newQModal','renameQModal','settingsModal'].forEach(id=>document.getElementById(id).classList.remove('open'));
    editingId=null;movingId=null;renamingQId=null;
  }
});

init();
</script>
</body>
</html>
